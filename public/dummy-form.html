<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Form - Alternative Everything</title>
  </head>
  <body>
    <!-- This file is used by Netlify to detect the form fields for the Astro ContactForm component. -->
    <form
      name="Contact"
      data-netlify="true"
      netlify-honeypot="bot-field"
      method="POST"
      action="/thank-you"
    >
      <input type="hidden" name="form-name" value="Contact" />
      <p style="display:none">
        <label>Don’t fill this out: <input name="bot-field" /></label>
      </p>

      <!-- Basic Info -->
      <input type="text" name="name" />
      <input type="text" name="age" />
      <input type="text" name="sex" />
      <input type="text" name="race" />
      <input type="text" name="household_count" />

      <!-- Values / Background -->
      <input type="radio" name="christian" value="yes" />
      <input type="radio" name="christian" value="no" />

      <input type="radio" name="joseph_smith" value="yes" />
      <input type="radio" name="joseph_smith" value="no" />

      <input type="radio" name="red_pilled" value="yes" />
      <input type="radio" name="red_pilled" value="no" />

      <input type="radio" name="family_head" value="husband" />
      <input type="radio" name="family_head" value="wife" />
      <input type="radio" name="family_head" value="mutual" />

      <!-- Reasons -->
      <input type="number" name="reason_creating_a_healthy_moral_culture" />
      <input type="number" name="reason_fostering_interpersonal_relationships" />
      <input type="number" name="reason_making_a_healthy_environment_for_children" />
      <input type="number" name="reason_growing_or_raising_your_own_food" />
      <input type="number" name="reason_mutual_selfdefense" />
      <input type="number" name="reason_relocating_to_a_better_area" />
      <input type="number" name="reason_working_with_like_minded_people" />
      <input type="number" name="reason_spiritual_growth" />
      <input type="number" name="reason_outreach_ministry_or_charity_work" />
      <input type="number" name="reason_affordable_housing" />
      <input type="number" name="reason_escaping_a_coming_disaster" />
      <input type="number" name="reason_other" />

      <button type="submit">Submit</button>
    </form>
  </body>
</html>
