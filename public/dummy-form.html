<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Form - Alternative Everything</title>
  </head>
  <body>
    <!-- This file is used by Netlify to detect the form fields for the Astro ContactForm component. -->
    <form
      name="Contact"
      data-netlify="true"
      netlify-honeypot="bot-field"
      method="POST"
      action="/"
    >
      <input type="hidden" name="form-name" value="Contact" />
      <p style="display:none">
        <label>Don’t fill this out: <input name="bot-field" /></label>
      </p>

      <!-- Basic Info -->
      <input type="text" name="name" />
      <input type="text" name="age" />
      <input type="text" name="sex" />
      <input type="text" name="race" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="location" />
      <input type="text" name="household_count" />

      <!-- Values / Background -->
      <input type="radio" name="christian" value="yes" />
      <input type="radio" name="christian" value="no" />

      <select name="tradition">
        <option value="Non-Denominational">Non-Denominational</option>
        <option value="Other">Other</option>
        <option value="Not Applicable">Not Applicable</option>
      </select>

      <input type="radio" name="red_pilled" value="yes" />
      <input type="radio" name="red_pilled" value="no" />

      <input type="radio" name="family_head" value="husband" />
      <input type="radio" name="family_head" value="wife" />
      <input type="radio" name="family_head" value="mutual" />

      <!-- Reasons / Priorities (Checkbox Group) -->
      <input type="checkbox" name="reasons" value="Spiritual growth" />
      <input type="checkbox" name="reasons" value="Sustainable living" />

      <!-- New Text Sections -->
      <textarea name="personal_journey"></textarea>
      <textarea name="skills_trades"></textarea>

      <!-- Logistics -->
      <select name="timeline">
        <option value="Immediately (Within 3 months)">Immediately</option>
      </select>

      <textarea name="other_explanation"></textarea>

      <button type="submit">Submit</button>
    </form>
  </body>
</html>
